name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Create branch slug
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's#[/_]#-#g' \
            | sed 's#[^a-z0-9-]##g' \
            | sed 's#--*#-#g' \
            | sed 's#^-##' \
            | sed 's#-$##' \
            | cut -c1-40)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Tear down preview on VPS
        env:
          BRANCH_SLUG: ${{ steps.branch.outputs.slug }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" \
            BRANCH_SLUG="$BRANCH_SLUG" \
            bash -s <<'REMOTE'
          set -eux

          APP_DIR="$HOME/apps/previews/$BRANCH_SLUG"
          echo "==> tearing down $BRANCH_SLUG"

          if [ -f "$APP_DIR/docker-compose.yml" ]; then
            docker compose -f "$APP_DIR/docker-compose.yml" down -v --remove-orphans || true
          fi

          docker rm -f "code-arena-$BRANCH_SLUG" 2>/dev/null || true
          rm -rf "$APP_DIR"

          sudo rm -f "/etc/caddy/sites/$BRANCH_SLUG.caddy"
          sudo systemctl reload caddy

          echo "==> cleanup done"
          sudo ls -la /etc/caddy/sites || true
          REMOTE

      - name: Update PR comment
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_COMMENT_TOKEN }}
          script: |
            const marker = '<!-- preview-link-comment -->';
            const body = `${marker}
            🧹 Preview torn down for \`${{ github.head_ref }}\`.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: jonaaldas/code-arena

    steps:
      - name: Validate BASE_DOMAIN
        run: |
          if [ -z "${{ secrets.BASE_DOMAIN }}" ]; then
            echo "BASE_DOMAIN secret is empty"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create branch slug
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's#[/_]#-#g' \
            | sed 's#[^a-z0-9-]##g' \
            | sed 's#--*#-#g' \
            | sed 's#^-##' \
            | sed 's#-$##' \
            | cut -c1-40)

          PORT=$((5000 + ${{ github.event.pull_request.number }}))
          DOMAIN="$SLUG.${{ secrets.BASE_DOMAIN }}"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.slug }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy preview on VPS
        env:
          BRANCH_SLUG: ${{ steps.branch.outputs.slug }}
          DOMAIN: ${{ steps.branch.outputs.domain }}
          PORT: ${{ steps.branch.outputs.port }}
          IMAGE: ${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.slug }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" \
            BRANCH_SLUG="$BRANCH_SLUG" \
            DOMAIN="$DOMAIN" \
            PORT="$PORT" \
            IMAGE="$IMAGE" \
            bash -s <<'REMOTE'
          set -eux

          echo "==> remote env: BRANCH_SLUG=$BRANCH_SLUG DOMAIN=$DOMAIN PORT=$PORT IMAGE=$IMAGE"

          APP_DIR="$HOME/apps/previews/$BRANCH_SLUG"
          mkdir -p "$APP_DIR"

          COMPOSE_FILE="$APP_DIR/docker-compose.yml"
          cp "$HOME/apps/myapp/docker-compose.yml" "$COMPOSE_FILE"

          echo "==> APP_DIR=$APP_DIR"

          sed -i -E "s|^([[:space:]]*image:[[:space:]]*).*$|\1$IMAGE|" "$COMPOSE_FILE"
          sed -i -E "s|^([[:space:]]*container_name:[[:space:]]*).*$|\1code-arena-$BRANCH_SLUG|" "$COMPOSE_FILE"
          sed -i -E "s|127\.0\.0\.1:[0-9]+:3000|127.0.0.1:$PORT:3000|g" "$COMPOSE_FILE"
          sed -i -E "s|^([[:space:]]*env_file:[[:space:]]*).*$|\1../.env|" "$COMPOSE_FILE"
          sed -i -E "s|^([[:space:]]*BETTER_AUTH_URL:[[:space:]]*).*$|\1https://$DOMAIN|" "$COMPOSE_FILE"
          sed -i -E "/^[[:space:]]*NUXT_APP_ENV:[[:space:]]*prod[[:space:]]*$/d" "$COMPOSE_FILE"


          echo "==> wrote docker-compose.yml:"
          cat "$COMPOSE_FILE"

          docker compose -f "$COMPOSE_FILE" pull

          echo "==> stopping any existing container"
          docker compose -f "$COMPOSE_FILE" down --remove-orphans --timeout 10 || true
          docker rm -f "code-arena-$BRANCH_SLUG" 2>/dev/null \
            || sudo docker rm -f "code-arena-$BRANCH_SLUG" 2>/dev/null \
            || true

          docker compose -f "$COMPOSE_FILE" up -d
          echo "==> docker compose up finished"

          sudo mkdir -p /etc/caddy/sites
          printf '%s {\n    reverse_proxy 127.0.0.1:%s\n}\n' "$DOMAIN" "$PORT" \
            | sudo tee "/etc/caddy/sites/$BRANCH_SLUG.caddy" > /dev/null

          echo "==> caddy site file at /etc/caddy/sites/$BRANCH_SLUG.caddy:"
          sudo cat "/etc/caddy/sites/$BRANCH_SLUG.caddy"
          echo "==> /etc/caddy/sites contents:"
          sudo ls -la /etc/caddy/sites

          sudo systemctl reload caddy
          echo "==> caddy reloaded"
          sudo systemctl status caddy --no-pager | head -n 20
          REMOTE

      - name: Comment preview link on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ steps.branch.outputs.domain }}
        with:
          github-token: ${{ secrets.GH_COMMENT_TOKEN }}
          script: |
            const marker = '<!-- preview-link-comment -->';
            const body = `${marker}
            🚀 Preview deployed

            * URL: ${process.env.PREVIEW_URL}
            * Branch: \`${{ github.head_ref }}\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

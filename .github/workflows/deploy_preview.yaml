name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: jonaaldas/code-arena
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:pr-${{ env.PR_NUMBER }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy preview on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e

            PR_NUMBER=${{ github.event.pull_request.number }}
            IMAGE="jonaaldas/code-arena:pr-$PR_NUMBER"
            APP_DIR="$HOME/apps/previews/pr-$PR_NUMBER"
            PORT=$((4000 + PR_NUMBER))

            mkdir -p "$APP_DIR"

            cat > "$APP_DIR/docker-compose.yml" << COMPOSE
            services:
              app:
                image: $IMAGE
                container_name: code-arena-pr-$PR_NUMBER
                restart: unless-stopped
                ports:
                  - "$PORT:3000"
            COMPOSE

            docker compose -f "$APP_DIR/docker-compose.yml" pull
            docker compose -f "$APP_DIR/docker-compose.yml" up -d
          EOF

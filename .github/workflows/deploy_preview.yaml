name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write

jobs:
  preview:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: jonaaldas/code-arena
      BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create branch slug
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's#[/_]#-#g' \
            | sed 's#[^a-z0-9-]##g' \
            | sed 's#--*#-#g' \
            | sed 's#^-##' \
            | sed 's#-$##' \
            | cut -c1-40)

          PORT=$((5000 + ${{ github.event.pull_request.number }}))
          DOMAIN="$SLUG.${{ secrets.BASE_DOMAIN }}"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.slug }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy preview on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            set -e

            BRANCH_SLUG="${{ steps.branch.outputs.slug }}"
            DOMAIN="${{ steps.branch.outputs.domain }}"
            PORT="${{ steps.branch.outputs.port }}"
            IMAGE="${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.slug }}"
            APP_DIR="\$HOME/apps/previews/\$BRANCH_SLUG"

            mkdir -p "\$APP_DIR"

            cat > "\$APP_DIR/docker-compose.yml" << COMPOSE
            services:
              app:
                image: $IMAGE
                container_name: code-arena-\$BRANCH_SLUG
                restart: unless-stopped
                ports:
                  - "127.0.0.1:$PORT:3000"
            COMPOSE

            docker compose -f "\$APP_DIR/docker-compose.yml" pull
            docker compose -f "\$APP_DIR/docker-compose.yml" up -d --force-recreate

            sudo mkdir -p /etc/caddy/sites
            sudo tee /etc/caddy/sites/\$BRANCH_SLUG.caddy > /dev/null << CADDY
            $DOMAIN {
                reverse_proxy 127.0.0.1:$PORT
            }
            CADDY

            sudo systemctl reload caddy
          EOF

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: https://${{ steps.branch.outputs.domain }}
        with:
          script: |
            const marker = '<!-- preview-link-comment -->';
            const body = `${marker}
            🚀 Preview deployed

            * URL: ${process.env.PREVIEW_URL}
            * Branch: \`${{ github.head_ref }}\`
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
